[phases.setup]
nixPkgs = ["nodejs_22", "jdk21"]

[phases.install]
cmds = ["corepack enable", "corepack prepare pnpm@10.26.1 --activate", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["java -version", "pnpm run build:railway"]

[start]
cmd = "java -version && node artifacts/api-server/dist/index.mjs"
